name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Import smoke
        run: >
          python -c
          "import gem_lasso;
          from gem_lasso import GaussianMixtureGraphicalLasso, GraphicalLassoResult,
          ModelSelectionResult, evaluate_model_grid, random_sparse_spd_matrix,
          sample_mixture_normal, select_best_result;
          print(gem_lasso.__all__)"

      - name: Run tests
        run: python -m pytest

      - name: Run Ruff
        run: ruff check gem_lasso tests examples benchmarks

      - name: Build sdist and wheel
        run: python -m build
